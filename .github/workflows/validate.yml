name: validate
on:
  pull_request:
  push:
    branches: [main]
jobs:
  validate-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python scripts/validate-openspec-change.py examples/product-docs/openspec/changes/add-smart-routing --mode product
      - run: python scripts/validate-openspec-change.py examples/server-backend/openspec/changes/add-smart-routing-backend --mode repo
